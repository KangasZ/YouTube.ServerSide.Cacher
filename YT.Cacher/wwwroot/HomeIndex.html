<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YT Cacher</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #1e1e1e;
            color: #eee;
        }

        .container {
            display: flex;
            gap: 0.5rem;
        }

        input, button {
            padding: 0.6rem 1rem;
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid #444;
        }

        input {
            background: #2b2b2b;
            color: #eee;
            width: 320px;
        }

        button {
            background: #007acc;
            color: white;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background: #0098ff;
        }

        #status {
            margin-top: 1rem;
            min-height: 1.2em;
            text-align: center;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #stats {
            margin-top: 1rem;
            width: 460px;
            background: #2b2b2b;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.75rem 1rem;
            display: none;
        }

        #stats.visible {
            display: block;
        }

        #stats h4 {
            margin: 0.25rem 0 0.4rem;
            font-size: 0.85rem;
            color: #ccc;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        #stats .row {
            display: flex;
            justify-content: space-between;
            margin: 0.15rem 0;
            font-size: 0.9rem;
        }

        #stats .label {
            color: #aaa;
        }

        #stats .bar {
            height: 8px;
            background: #1e1e1e;
            border-radius: 4px;
            overflow: hidden;
            margin: 0.25rem 0 0.6rem;
        }

        #stats .fill {
            height: 100%;
            width: 0;
            background: #007acc;
            transition: width 0.3s ease;
        }

        #stats .fill.audio {
            background: #b07ad6;
        }

        #stats.state-done .fill {
            background: #2ecc71;
        }

        #stats.state-failed .fill {
            background: #e74c3c;
        }

        #stats .status-pill {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            background: #1e1e1e;
            border: 1px solid #444;
            font-size: 0.8rem;
        }

        #stats.state-done .status-pill {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        #stats.state-failed .status-pill {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        button.danger {
            background: #c0392b;
        }

        button.danger:hover {
            background: #e74c3c;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <button id="clear" class="danger" title="Clear input">Clear</button>
        <button id="paste" title="Paste from clipboard">Paste</button>
        <input id="vid" type="text" placeholder="YouTube video ID or URL" autofocus/>
        <button id="go">Enter</button>
    </div>
    <div id="status"></div>
    <div id="stats">
        <div class="row">
            <span class="label">Status</span>
            <span class="status-pill" id="s-status">-</span>
        </div>
        <div class="row">
            <span class="label">Elapsed</span>
            <span id="s-elapsed">-</span>
        </div>
        <div class="row">
            <span class="label">Total Size</span>
            <span id="s-total-size">-</span>
        </div>

        <h4>Video</h4>
        <div class="bar">
            <div class="fill" id="fill-video"></div>
        </div>
        <div class="row"><span class="label">Progress</span><span id="s-vpct">-</span></div>
        <div class="row"><span class="label">Size</span><span id="s-vsize">-</span></div>
        <div class="row"><span class="label">Speed</span><span id="s-vspeed">-</span></div>

        <h4>Audio</h4>
        <div class="bar">
            <div class="fill audio" id="fill-audio"></div>
        </div>
        <div class="row"><span class="label">Progress</span><span id="s-apct">-</span></div>
        <div class="row"><span class="label">Size</span><span id="s-asize">-</span></div>
        <div class="row"><span class="label">Speed</span><span id="s-aspeed">-</span></div>
    </div>
</div>
<script>
    const input = document.getElementById('vid');
    const button = document.getElementById('go');
    const status = document.getElementById('status');
    const stats = document.getElementById('stats');
    const fill = document.getElementById('fill');

    let pollTimer = null;

    function extractVideoId(raw) {
        const value = raw.trim();
        if (!value) return null;
        try {
            const url = new URL(value);
            const host = url.hostname.replace(/^www\./, '');
            if (host === 'youtu.be') return url.pathname.slice(1).split('/')[0] || null;
            if (host.endsWith('youtube.com') || host.endsWith('youtube-nocookie.com')) {
                const v = url.searchParams.get('v');
                if (v) return v;
                const m = url.pathname.match(/^\/(?:embed|shorts|live|v)\/([^/?#]+)/);
                if (m) return m[1];
            }
        } catch { /* not a URL */
        }
        if (/^[A-Za-z0-9_-]{6,}$/.test(value)) return value;
        return null;
    }

    function setField(id, value) {
        document.getElementById(id).textContent = value ?? '-';
    }

    const TERMINAL_STATES = new Set(['Success', 'Cached', 'Failed', 'Canceled']);
    const DONE_STATES = new Set(['Success', 'Cached']);
    const FAIL_STATES = new Set(['Failed', 'Canceled']);

    const fillVideo = document.getElementById('fill-video');
    const fillAudio = document.getElementById('fill-audio');

    function clampPct(n) {
        const v = typeof n === 'number' ? n : 0;
        return Math.min(100, Math.max(0, v));
    }

    function fmtElapsed(startIso) {
        if (!startIso) return '-';
        const ms = Date.now() - new Date(startIso).getTime();
        if (!isFinite(ms) || ms < 0) return '-';
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s / 60);
        return m > 0 ? `${m}m ${s % 60}s` : `${s}s`;
    }

    function renderStats(info) {
        stats.classList.add('visible');
        stats.classList.remove('state-done', 'state-failed');

        const state = info.status ?? '-';
        const vPct = clampPct(info.videoProgress);
        const aPct = clampPct(info.audioProgress);
        const vSize = info.videoSize ?? '-';
        const aSize = info.audioSize ?? '-';
        const totalSize = info.totalSize ?? '-';
        const vSpeed = info.videoDownloadSpeed ?? '-';
        const aSpeed = info.audioDownloadSpeed ?? '-';
        const start = info.startTime ?? null;

        fillVideo.style.width = `${vPct.toFixed(1)}%`;
        fillAudio.style.width = `${aPct.toFixed(1)}%`;

        setField('s-status', state);
        setField('s-total-size', totalSize);
        setField('s-elapsed', fmtElapsed(start));
        setField('s-vpct', `${vPct.toFixed(1)}%`);
        setField('s-vsize', vSize);
        setField('s-vspeed', vSpeed);
        setField('s-apct', `${aPct.toFixed(1)}%`);
        setField('s-asize', aSize);
        setField('s-aspeed', aSpeed);

        if (DONE_STATES.has(state)) stats.classList.add('state-done');
        if (FAIL_STATES.has(state)) stats.classList.add('state-failed');
    }

    async function pollOnce(id) {
        try {
            const r = await fetch(`/status?v=${encodeURIComponent(id)}`, {method: 'POST'});
            if (r.status === 404) {
                stopPolling();
                return;
            }
            if (!r.ok) throw new Error(r.statusText);
            const info = await r.json();
            renderStats(info);
            if (TERMINAL_STATES.has(info.status)) stopPolling();
        } catch (err) {
            status.textContent = `status error: ${err.message}`;
            stopPolling();
        }
    }

    function startPolling(id) {
        stopPolling();
        pollOnce(id);
        pollTimer = setInterval(() => pollOnce(id), 1000);
    }

    function stopPolling() {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
    }

    async function submit() {
        const id = extractVideoId(input.value);
        if (!id) {
            status.textContent = 'Invalid video ID or URL';
            return;
        }

        const url = `${window.location.origin}/watch?v=${encodeURIComponent(id)}`;
        try {
            await navigator.clipboard.writeText(url);
            status.textContent = `Copied: ${url}`;
        } catch {
            status.textContent = `URL: ${url}`;
        }

        try {
            const r = await fetch(`/queue?v=${encodeURIComponent(id)}`, {method: 'POST'});
            if (!r.ok) throw new Error(r.statusText);
            startPolling(id);
        } catch (err) {
            status.textContent += ` (queue error: ${err.message})`;
        }
    }

    button.addEventListener('click', submit);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') submit();
    });

    const pasteBtn = document.getElementById('paste');
    const clearBtn = document.getElementById('clear');

    clearBtn.addEventListener('click', () => {
        input.value = '';
        input.focus();
    });

    pasteBtn.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            input.value = text;
            input.focus();
        } catch (err) {
            status.textContent = `paste error: ${err.message}`;
        }
    });
</script>
</body>
</html>
