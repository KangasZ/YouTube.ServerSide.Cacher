<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YT Cacher</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #1e1e1e;
            color: #eee;
        }

        .container {
            display: flex;
            gap: 0.5rem;
        }

        input, button {
            padding: 0.6rem 1rem;
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid #444;
        }

        input {
            background: #2b2b2b;
            color: #eee;
            width: 320px;
        }

        button {
            background: #007acc;
            color: white;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background: #0098ff;
        }

        #status {
            margin-top: 1rem;
            min-height: 1.2em;
            text-align: center;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #stats {
            margin-top: 1rem;
            width: 460px;
            background: #2b2b2b;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.75rem 1rem;
            display: none;
        }

        #stats.visible {
            display: block;
        }

        #stats h4 {
            margin: 0.25rem 0 0.4rem;
            font-size: 0.85rem;
            color: #ccc;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        #stats .row {
            display: flex;
            justify-content: space-between;
            margin: 0.15rem 0;
            font-size: 0.9rem;
        }

        #stats .label {
            color: #aaa;
        }

        #stats .bar {
            height: 8px;
            background: #1e1e1e;
            border-radius: 4px;
            overflow: hidden;
            margin: 0.25rem 0 0.6rem;
        }

        #stats .fill {
            height: 100%;
            width: 0;
            background: #007acc;
            transition: width 0.3s ease;
        }

        #stats .fill.audio {
            background: #b07ad6;
        }

        #stats.state-done .fill {
            background: #2ecc71;
        }

        #stats.state-failed .fill {
            background: #e74c3c;
        }

        #stats .status-pill {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            background: #1e1e1e;
            border: 1px solid #444;
            font-size: 0.8rem;
        }

        #stats.state-done .status-pill {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        #stats.state-failed .status-pill {
            border-color: #e74c3c;
            color: #e74c3c;
        }

        #stats .fill.total {
            background: #f1c40f;
        }

        #stats.state-done .fill,
        #stats.state-done .fill.total {
            background: #2ecc71;
        }

        #stats.state-failed .fill,
        #stats.state-failed .fill.total {
            background: #e74c3c;
        }

        button.danger {
            background: #c0392b;
        }

        button.danger:hover {
            background: #e74c3c;
        }
    </style>
    <script src="HomeIndex.js" defer></script>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <button id="clear" class="danger" title="Clear input">Clear</button>
        <button id="paste" title="Paste from clipboard">Paste</button>
        <input id="vid" type="text" placeholder="YouTube video ID or URL" autofocus/>
        <button id="go">Enter</button>
    </div>
    <div id="status"></div>
    <div id="stats">
        <div class="row">
            <span class="label">Status</span>
            <span class="status-pill" id="s-status">-</span>
        </div>
        <div class="row">
            <span class="label">Elapsed</span>
            <span id="s-elapsed">-</span>
        </div>
        <div class="row"><span class="label">Download Speed</span><span id="s-speed">-</span></div>

        <h4>Total</h4>
        <div class="bar">
            <div class="fill total" id="fill-total"></div>
        </div>
        <div class="row"><span class="label">Progress</span><span id="s-tpct">-</span></div>
        <div class="row"><span class="label">Size</span><span id="s-total-size">-</span></div>

<!--        <h4>Video</h4>-->
<!--        <div class="bar">-->
<!--            <div class="fill" id="fill-video"></div>-->
<!--        </div>-->
<!--        <div class="row"><span class="label">Progress</span><span id="s-vpct">-</span></div>-->
<!--        <div class="row"><span class="label">Size</span><span id="s-vsize">-</span></div>-->
<!--        <div class="row"><span class="label">Speed</span><span id="s-vspeed">-</span></div>-->

<!--        <h4>Audio</h4>-->
<!--        <div class="bar">-->
<!--            <div class="fill audio" id="fill-audio"></div>-->
<!--        </div>-->
<!--        <div class="row"><span class="label">Progress</span><span id="s-apct">-</span></div>-->
<!--        <div class="row"><span class="label">Size</span><span id="s-asize">-</span></div>-->
<!--        <div class="row"><span class="label">Speed</span><span id="s-aspeed">-</span></div>-->
    </div>
</div>
</body>
</html>
