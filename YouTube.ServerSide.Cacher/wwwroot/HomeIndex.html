<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YT Cacher</title>
    <link rel="stylesheet" href="HomeIndex.css"/>
    <script src="HomeIndex.js" defer></script>
</head>
<body>
<div class="wrapper">
    <div class="container">
        <button id="buttonClear" class="danger" title="Clear input">Clear</button>
        <button id="buttonPaste" title="Paste from clipboard">Paste</button>
        <input id="inputVideoId" type="text" placeholder="YouTube video ID or URL" autofocus/>
        <button id="buttonGo">Enter</button>
    </div>
    <div id="status"></div>
    <div id="stats">
        <div class="row">
            <span class="label">Status</span>
            <span class="status-pill" id="stats-statusEnum">-</span>
        </div>
        <div class="row">
            <span class="label">Elapsed</span>
            <span id="stats-elapsed">-</span>
        </div>
        <div class="row">
            <span class="label">Eta</span>
            <span id="stats-eta">-</span>
        </div>
        <div class="row">
            <span class="label">Download Speed</span>
            <span id="stats-speed">-</span>
        </div>
        <h4>Total</h4>
        <div class="bar">
            <div class="fill total" id="fill-total"></div>
        </div>
        <div class="row">
            <span class="label">Progress</span>
            <span id="stats-progressPercent">-</span>
        </div>
        <div class="row">
            <span class="label">Size</span>
            <span id="stats-size">-</span>
        </div>
    </div>
</div>
</body>
</html>
